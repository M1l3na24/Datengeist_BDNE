version: '3.8'

services:
  # --- POSTGRES ---
  db_sql:
    image: postgres:15
    container_name: sql_server_contenedor
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: cuyos123
      POSTGRES_DB: datengeist
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: angeljza0612@gmail.com
      PGADMIN_DEFAULT_PASSWORD: cuyos123
    ports:
      - "8080:80"
    depends_on:
      - db_sql

  # --- MONGODB ---
  mongodb:
    image: mongo:latest
    container_name: mongodb_datengeist
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: cuyos123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express_ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:cuyos123@mongodb:27017/
    depends_on:
      - mongodb

  # --- METABASE ---
  metabase:
    image: metabase/metabase:v0.48.6
    container_name: metabase_datengeist
    restart: always
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: admin
      MB_DB_PASS: cuyos123
      MB_DB_HOST: db_sql
    depends_on:
      - db_sql
      - mongodb
    volumes:
      - metabase_data:/metabase-data

volumes:
  mongo_data:
  metabase_data:
